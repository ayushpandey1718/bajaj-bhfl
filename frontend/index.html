<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BFHL Hierarchy Builder</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container app-shell">
      <header class="page-header">
        <div>
          <p class="eyebrow">SRM Full Stack Engineering Challenge</p>
          <h1>BFHL Hierarchy Analyzer</h1>
          <p class="subtitle">
            Submit directed edges and view parsed trees, cycles, and summary metrics in one place.
          </p>
        </div>
      </header>

      <div class="layout">
        <section class="card input-card">
          <h2>Input</h2>
          <label for="node-input">Node List</label>
          <textarea
            id="node-input"
            rows="10"
            placeholder="Enter edges separated by comma or newline&#10;Example: A->B, A->C, B->D"
          ></textarea>
          <div class="helper-row">
            <button id="load-sample-btn" class="secondary-btn" type="button">Load Sample</button>
            <button id="clear-btn" class="secondary-btn" type="button">Clear</button>
          </div>
          <div class="controls">
            <label for="api-url">API Base URL</label>
            <input id="api-url" type="text" placeholder="https://your-domain.vercel.app" />
            <button id="submit-btn" type="button">Analyze</button>
          </div>
          <p id="status" class="status"></p>
        </section>

        <section class="card output-card">
          <h2>Structured Response</h2>
          <div id="structured-response"></div>
        </section>
      </div>

      <section class="card raw-card">
        <div class="card-title-row">
          <h2>Raw JSON</h2>
          <button id="copy-json-btn" class="secondary-btn" type="button">Copy JSON</button>
        </div>
        <pre id="response-box">{}</pre>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
